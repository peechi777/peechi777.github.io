def generate_args(tool_def: dict, max_retries: int = 3) -> dict | None:
    """Step 1：用 LLM 生成符合 schema 的 args，最多重試 max_retries 次。"""
    messages = _build_args_prompt(tool_def)
    for attempt in range(max_retries):
        try:
            raw = llm(messages, temperature=0.9, top_p=0.95)
            obj = _extract_first_json(raw)
            if obj is None:
                continue
            ok, _ = _validate_args(obj, tool_def)
            if ok:
                return obj
        except requests.RequestException:
            time.sleep(1)
    return None


def generate_user_query(tool_call_obj: dict) -> str | None:
    """Step 2：給定 tool_call，用 LLM 反推自然 user query。"""
    messages = _build_query_prompt(tool_call_obj)
    try:
        text = llm(messages, temperature=1.0, top_p=0.95).strip()
        text = text.strip("「」\"' \n\t")
        return text or None
    except requests.RequestException:
        return None

            {"role": "user", "content": user_text},

        return {"text": text}

    ds = ds.map(format_example, remove_columns=["messages"])

    # Step 4: 設定 LoRA 配置
    # ==========================================================================
    # LoRA 的關鍵超參數說明：
    #
    # r (rank)：低秩矩陣的秩
    #   - 越大 → Adapter 越大 → 表達能力越強 → 記憶體越多
    #   - 建議範圍：8-64
    #
    # lora_alpha：縮放係數
    #   - 影響 Adapter 的更新幅度
    #   - 通常設為 2*r
    #
    # lora_dropout：Dropout 機率
    #   - 防止過擬合
    #   - 建議：0.05-0.1
    #
    # target_modules：要加 Adapter 的層
    #   - 通常選 attention 的 projection 層
    #   - q_proj, k_proj, v_proj, o_proj 是常見選擇
    
    print("\n[Step 4] 設定 LoRA 配置...")
    
    lora_config = LoraConfig(
        r=16,                   # 秩：16 是常用的起始值
        lora_alpha=32,          # 縮放係數：通常 2*r
        lora_dropout=0.05,      # Dropout
        bias="none",            # 不訓練 bias（減少參數）
        task_type="CAUSAL_LM",  # 任務類型：因果語言模型
        target_modules=[        # 目標層：Attention 的各個 projection
            "q_proj",           # Query projection
            "k_proj",           # Key projection
            "v_proj",           # Value projection
            "o_proj",           # Output projection
        ],
    )
    
    print(f"  LoRA rank: {lora_config.r}")
    print(f"  LoRA alpha: {lora_config.lora_alpha}")
    print(f"  Target modules: {lora_config.target_modules}")
    
    # ==========================================================================
    # Step 5: 設定訓練參數
    # ==========================================================================
    # TrainingArguments 包含所有訓練相關的設定
    #
    # 關鍵參數說明：
    # - num_train_epochs：訓練幾個 epoch
    # - per_device_train_batch_size：每個 GPU 的 batch size
    # - gradient_accumulation_steps：梯度累積（等效放大 batch size）
    # - learning_rate：學習率（LoRA 通常用較大的學習率）
    # - warmup_ratio：學習率預熱比例
    # - bf16：使用 bf16 精度
    
    print("\n[Step 5] 設定訓練參數...")
    
    training_args = SFTConfig(
        output_dir=OUT_DIR,
        
        # 訓練設定

        per_device_train_batch_size=1,      # 每 GPU batch size（根據記憶體調整）
        per_device_eval_batch_size=1,       # 評估 batch size
        gradient_accumulation_steps=16,      # 梯度累積 16 步 
        max_length=6144,
        
        # 學習率設定
        learning_rate=2e-4,                 # LoRA 常用較大學習率
        warmup_ratio=0.03,                  # 3% 的步數用於預熱
        max_grad_norm=1.0,                  # 梯度裁剪
        
        # 日誌和儲存
        logging_steps=1,                   # 每 1 步記錄一次
        # eval_strategy="epoch",        # 按步數評估
        save_strategy="epoch",
        
        # 精度和優化
        bf16=True,                          # 使用 bf16（需要支援的 GPU）
        optim="adamw_torch",                # 優化器
        
        # 其他
        report_to="none",                   # 不回報到 wandb 等平台
    )
    
    print(f"  Epochs: {training_args.num_train_epochs}")
    print(f"  Batch size: {training_args.per_device_train_batch_size}")
    print(f"  Learning rate: {training_args.learning_rate}")
    
    # ==========================================================================
    # Step 6: 建立 SFTTrainer 並開始訓練
    # ==========================================================================
    # SFTTrainer 是 TRL 提供的監督式微調訓練器
    # 它會自動處理：
    # - 資料 tokenization
    # - LoRA 的初始化和訓練
    # - 訓練迴圈
    
    print("\n[Step 6] 建立 Trainer 並開始訓練...")
    
    trainer = SFTTrainer(
        model=model,
        train_dataset=ds["train"],
        # eval_dataset=ds["validation"],
        peft_config=lora_config,            # LoRA 配置
        args=training_args,
    )
    
    # 開始訓練！
    print("\n開始訓練...")
    print("-" * 40)
    
    trainer.train()
    
    print("-" * 40)
    print("訓練完成！")

    print("\n[Step 7] 儲存 Adapter...")

def generate(prompt: str, use_adapter: bool = True) -> str:
    """
    使用模型生成回應
    
    Args:
        prompt: 輸入的提示詞
        use_adapter: 是否載入 LoRA Adapter
                     True = 使用微調後的模型
                     False = 使用原始模型（用於比較）
    
    Returns:
        模型生成的文字
    
    Example:
        >>> prompt = "<|system|>\n你是客服助理\n<|user|>\n查訂單 A123\n<|assistant|>\n"
        >>> output = generate(prompt, use_adapter=True)
        >>> print(output)
    """
    
    # ==========================================================================
    # Step 1: 載入 Tokenizer
    # ==========================================================================
    print("載入 Tokenizer...")
    
    tok = AutoTokenizer.from_pretrained(BASE_MODEL, use_fast=True)
    
    # 設定 padding token
    if tok.pad_token is None:
        tok.pad_token = tok.eos_token
    
    # ==========================================================================
    # Step 2: 載入基礎模型
    # ==========================================================================
    print("載入基礎模型...")
    
    base = AutoModelForCausalLM.from_pretrained(
        BASE_MODEL,
        torch_dtype=torch.bfloat16,
        device_map="auto",
    )
    
    # ==========================================================================
    # Step 3: 載入 LoRA Adapter（如果需要）
    # ==========================================================================
    if use_adapter:
        print(f"載入 LoRA Adapter: {ADAPTER_DIR}")
        
        # PeftModel.from_pretrained() 會將 Adapter 疊加到基礎模型上
        # 數學上：W' = W + BA（原始權重 + Adapter）
        model = PeftModel.from_pretrained(base, ADAPTER_DIR)
    else:
        print("使用原始模型（不載入 Adapter）")
        model = base
    
    # 設定為評估模式
    model.eval()
    
    # ==========================================================================
    # Step 4: 生成回應
    # ==========================================================================
    print("生成回應...")
    
    # Tokenize 輸入
    inputs = tok(prompt, return_tensors="pt").to(model.device)
    
    # 生成
    with torch.no_grad():
        out = model.generate(
            **inputs,
            max_new_tokens=200,     # 最多生成 200 個 token
            do_sample=False,        # 不使用取樣（確定性輸出）
            # 如果要加入隨機性，可以改成：
            # do_sample=True,
            # temperature=0.7,
            # top_p=0.9,
        )
    
    # 解碼輸出
    return tok.decode(out[0], skip_special_tokens=True)`,

def chat(req: ChatReq):
    """
    聊天端點 - 處理使用者訊息並可能呼叫工具
    
    流程：
    ┌─────────────────────────────────────────────────────────────────┐
    │  1. 組合 system prompt + 使用者訊息                              │
    │  2. 呼叫 LLM 生成回應                                           │
    │  3. 檢查是否為 tool_call                                        │
    │     - 否 → 直接回傳                                             │
    │     - 是 → 驗證 → 重試（如果需要）→ 執行工具 → 生成最終回覆       │
    │  4. 回傳結果 + trace                                            │
    └─────────────────────────────────────────────────────────────────┘
    
    Args:
        req: 包含 messages 的請求物件
        
    Returns:
        ChatResp: 包含更新後的 messages 和 trace
    """
    
    # 記錄開始時間（用於計算延遲）
    start_time = time.time()

    # req.messages 是使用者傳入的對話歷史

    # 初始化 trace（觀測資訊）
    # trace 記錄每個步驟的結果，方便除錯和監控
    trace = {
        "steps": [],
        "start_time": start_time,
    }
    
    # ==========================================================================
    # Step 2: 呼叫 LLM
    # ==========================================================================
    out = call_llm(messages)
    trace["steps"].append({"model_out": out})
    
    # 嘗試提取 tool_call JSON
    tool_call = extract_json_block(out)
    
    # ==========================================================================
    # Step 3a: 沒有 tool_call → 直接回傳
    # ==========================================================================
    if not tool_call:
        messages.append({"role": "assistant", "content": out})
        trace["latency_ms"] = int((time.time() - start_time) * 1000)
        return {"messages": messages, "trace": trace}
    
    # ==========================================================================
    # Step 3b: 有 tool_call → 驗證
    # ==========================================================================
    ok, err = validate_tool_call(tool_call)
    
    if not ok:
        # ------------------------------------------------------------------
        # 驗證失敗 → 重試機制
        # ------------------------------------------------------------------
        # 這是重要的防呆機制！
        # LLM 可能輸出格式錯誤的 JSON，我們給它一次重試機會
        
        trace["steps"].append({"validation_error": err})
        
        # 告訴 LLM 它的輸出不合法
        messages.append({"role": "assistant", "content": out})
        messages.append({
            "role": "user", 
            "content": f"你的 tool_call 不合法：{err}。請只輸出合法 JSON。"
        })
        
        # 重試
        out2 = call_llm(messages)
        trace["steps"].append({"retry_out": out2})
        
        tool_call = extract_json_block(out2)
        
        if not tool_call:
            # 重試後仍無法解析 JSON → 放棄
            messages.append({"role": "assistant", "content": out2})
            trace["latency_ms"] = int((time.time() - start_time) * 1000)
            return {"messages": messages, "trace": trace}
        
        # 再次驗證
        ok, err = validate_tool_call(tool_call)
        if not ok:
            # 重試後仍不合法 → 放棄
            messages.append({"role": "assistant", "content": out2})
            trace["error"] = err
            trace["latency_ms"] = int((time.time() - start_time) * 1000)
            return {"messages": messages, "trace": trace}
    
    # ==========================================================================
    # Step 4: 執行工具
    # ==========================================================================
    name = tool_call["name"]
    args = tool_call["arguments"]
    
    trace["steps"].append({"tool_call": tool_call})
    
    # 執行工具函式
    # 在生產環境中，這裡應該加入：

        trace["steps"].append({"tool_result": result})
    except Exception as e:
        # 工具執行失敗
        trace["steps"].append({"tool_error": str(e)})
        result = {"ok": False, "error": str(e)}
    
    # ==========================================================================
    # Step 5: 餵回工具結果，生成最終回覆
    # ==========================================================================
    messages.append({"role": "assistant", "content": pretty(tool_call)})
    messages.append({"role": "user", "content": tool_result_message(name, result)})
    
    final = call_llm(messages)

    # ==========================================================================
    # 回傳結果
    # ==========================================================================
    trace["latency_ms"] = int((time.time() - start_time) * 1000)
    
    return {"messages": messages, "trace": trace}
