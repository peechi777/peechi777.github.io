def generate_reply(tokenizer, model, messages, max_new_tokens: int = 256):

    prompt = tokenizer.apply_chat_template(
        messages, 
        tokenize=False, 
        add_generation_prompt=True
    )

    inputs = tokenizer(prompt, return_tensors="pt").to(model.device)
    
    with torch.no_grad():
        outputs = model.generate(
            **inputs,
            max_new_tokens=max_new_tokens,
            do_sample=False, 
            repetition_penalty=1.1
        )
    
    input_len = inputs["input_ids"].shape[1]
    reply_text = tokenizer.decode(outputs[0][input_len:], skip_special_tokens=True)    

    return reply_text.strip()

#2
def evaluate_one(example: Dict[str, Any], reply: str) -> Dict[str, Any]:

    polite_keywords = ["您好", "請", "謝謝", "協助", "抱歉", "祝您"]
    polite = any(word in reply for word in polite_keywords)

    structured = bool(re.search(r"(\\d\\.|\\d\\)|步驟|首先|接下來|最後)", reply))

    zh_chars = len(CJK_RE.findall(reply))
    total_chars = len(reply) + 1e-9
    zh_ok = (zh_chars / total_chars) > 0.5

    topic = example.get("topic", "")
    topical = topic.lower() in reply.lower() if topic else True

    errors = []
    if not polite: errors.append("缺少禮貌用語")
    if not structured: errors.append("缺少結構化步驟")
    if not zh_ok: errors.append("語言非中文為主")
    if not topical: errors.append("主題相關性不足")

    score = sum([polite, structured, zh_ok, topical]) / 4.0

    return {"score": score, "errors": errors, "reply": reply}
`,

def generate_correct(tokenizer, model, messages) -> str:

    prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
    inputs = tokenizer(prompt, return_tensors="pt").to(model.device)
    
    with torch.no_grad():
        outputs = model.generate(

            max_new_tokens=256, 
            do_sample=False,
            repetition_penalty=1.1
        )
    
    input_len = inputs["input_ids"].shape[1]
    reply = tokenizer.decode(outputs[0][input_len:], skip_special_tokens=True)
    return reply.strip()
	
#2
def generate_wrong(tokenizer, model, messages) -> str:

    user_text = "\\n".join([m["content"] for m in messages if m["role"] == "user"])

    prompt = f"請用繁體中文回答：\\n{user_text}\\n回答："
    
    inputs = tokenizer(prompt, return_tensors="pt").to(model.device)
    
    with torch.no_grad():
        outputs = model.generate(
            **inputs, 
            max_new_tokens=256, 
            do_sample=False
        )
    
    input_len = inputs["input_ids"].shape[1]
    reply = tokenizer.decode(outputs[0][input_len:], skip_special_tokens=True)
    return reply.strip()
	
#3
def run_template_ablation(test_examples: List[Dict[str, Any]], tokenizer, model, max_samples: int = 5):

    for ex in test_examples[:max_samples]:
        good = generate_correct(tokenizer, model, ex["messages"])
        bad = generate_wrong(tokenizer, model, ex["messages"])

        eval_good = evaluate_one(ex, good)
        eval_bad = evaluate_one(ex, bad)

        print(f"\\n[{ex['id']}] 正確模板 分數={eval_good['score']:.2f}, 錯誤模板 分數={eval_bad['score']:.2f}")
        print("正確模板回覆：", textwrap.shorten(good, width=200, placeholder=" ..."))
        print("錯誤模板回覆：", textwrap.shorten(bad, width=200, placeholder=" ..."))`,
