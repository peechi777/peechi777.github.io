import matplotlib.pyplot as plt
import numpy as np

def get_sinusoidal_embeddings(n_pos, d_model):
    """
    n_pos: 序列長度 (Max sequence length)
    d_model: 嵌入維度
    """
    position = torch.arange(n_pos, dtype=torch.float).unsqueeze(1)

    div_term = torch.exp(torch.arange(0, d_model, 2).float() * (-np.log(10000.0) / d_model))
    
    pe = torch.zeros(n_pos, d_model)
    
    # 偶數(0, 2, 4)sin
    pe[:, 0::2] = torch.sin(position * div_term)
    # 奇數(1, 3, 5)cos
    pe[:, 1::2] = torch.cos(position * div_term)
    
    return pe

L, D = 100, 128
pe_matrix = get_sinusoidal_embeddings(L, D)


def visualize_pe_similarity(pe):
    # 計算點積矩陣 (L, D) @ (D, L) -> (L, L)
    similarity = torch.matmul(pe, pe.transpose(0, 1))
    
    plt.figure(figsize=(8, 6))
    plt.imshow(similarity.numpy(), cmap='viridis')
    plt.colorbar()
    plt.title("Position Embedding Dot Product Similarity")
    plt.xlabel("Position")
    plt.ylabel("Position")
    plt.savefig("position_embedding_similarity.png")
    plt.show()

visualize_pe_similarity(pe_matrix)`,

import torch.nn as nn

class PositionWiseFeedForward(nn.Module):
    def __init__(self, d_model, d_ff, dropout=0.1):
        super(PositionWiseFeedForward, self).__init__()

        self.w_1 = nn.Linear(d_model, d_ff)

        self.w_2 = nn.Linear(d_ff, d_model)

        self.activation = nn.ReLU() 
        self.dropout = nn.Dropout(dropout)

    def forward(self, x):
        
        x = self.activation(self.w_1(x))
        
        x = self.dropout(x)
        
        x = self.w_2(x)
        
        return x
    
batch_size = 2
seq_len = 100
d_model = 128
d_ff = 512 

ffn = PositionWiseFeedForward(d_model, d_ff)

• 2.說明 GPT 的基本 Transformer block 長什麼樣子。`,  
    code: `import torch
import torch.nn as nn
import math

class PureTransformerBlock(nn.Module):
    def __init__(self, d_model, n_heads, d_ff):
        super().__init__()
        self.h = n_heads
        self.d_k = d_model // n_heads

        self.w_q = nn.Linear(d_model, d_model)
        self.w_k = nn.Linear(d_model, d_model)
        self.w_v = nn.Linear(d_model, d_model)
        self.w_out = nn.Linear(d_model, d_model)
        
        #FFN 
        self.ffn = nn.Sequential(
            nn.Linear(d_model, d_ff),
            nn.ReLU(),
            nn.Linear(d_ff, d_model)
        )
        
        # LayerNorm
        self.ln1 = nn.LayerNorm(d_model)
        self.ln2 = nn.LayerNorm(d_model)

    def forward(self, x):
        B, L, D = x.shape
        
        residual = x
        x = self.ln1(x) 
        
        q = self.w_q(x).view(B, L, self.h, self.d_k).transpose(1, 2)
        k = self.w_k(x).view(B, L, self.h, self.d_k).transpose(1, 2)
        v = self.w_v(x).view(B, L, self.h, self.d_k).transpose(1, 2)
        
        scores = torch.matmul(q, k.transpose(-2, -1)) / math.sqrt(self.d_k)
        
        mask = torch.tril(torch.ones(L, L, device=x.device)).view(1, 1, L, L)
        scores = scores.masked_fill(mask == 0, float('-inf'))
        
        attn_weights = torch.softmax(scores, dim=-1)
        
        context = torch.matmul(attn_weights, v)
        context = context.transpose(1, 2).contiguous().view(B, L, D)
        
        x = residual + self.w_out(context)
        
        residual = x
        x = self.ln2(x) # Pre-Norm
        x = residual + self.ffn(x) 
        
        return x

model = PureTransformerBlock(d_model=128, n_heads=8, d_ff=512)
x = torch.randn(2, 100, 128)
output = model(x)
print(f"最終輸出形狀: {output.shape} (預期為 [2, 100, 128])")
`,

• 2.說明 GPT 推論時可以靠 KV Cache 避免重複計算。`,  
    code: `import torch
import torch.nn as nn
import math

class KVCacheTransformerBlock(nn.Module):
    def __init__(self, d_model, n_heads, d_ff):
        super().__init__()
        self.h = n_heads # 頭數
        self.d_k = d_model // n_heads # 每頭的維度
        self.w_q = nn.Linear(d_model, d_model)
        self.w_k = nn.Linear(d_model, d_model)
        self.w_v = nn.Linear(d_model, d_model)
        self.w_out = nn.Linear(d_model, d_model)
        self.ln1 = nn.LayerNorm(d_model)    # LayerNorm 1

    def forward(self, x, past_kv=None):
        B, L_new, D = x.shape 
        x_norm = self.ln1(x)
        
        # (B, H, L_new, d_k)
        q = self.w_q(x_norm).view(B, L_new, self.h, self.d_k).transpose(1, 2)
        k = self.w_k(x_norm).view(B, L_new, self.h, self.d_k).transpose(1, 2)
        v = self.w_v(x_norm).view(B, L_new, self.h, self.d_k).transpose(1, 2)

        if past_kv is not None:
            k_old, v_old = past_kv
            k = torch.cat([k_old, k], dim=2) # 將新的 K 拼接在舊的 K 後面
            v = torch.cat([v_old, v], dim=2) # 將新的 V 拼接在舊的 V 後面
        
        present_kv = (k, v)
        scores = torch.matmul(q, k.transpose(-2, -1)) / math.sqrt(self.d_k)
        attn = torch.softmax(scores, dim=-1) # (B, H, L_new, L_total)
        
        out = torch.matmul(attn, v)
        out = out.transpose(1, 2).contiguous().view(B, L_new, D)
        return self.w_out(out), present_kv


def greedy_decode_demo():
    B, D, H = 1, 128, 8
    block = KVCacheTransformerBlock(D, H, 512)
    block.eval()

    tokens = torch.randn(B, 3, D) # 模擬前面已經生成了 3 個 token 的輸入
    
    out_full, _ = block(tokens)
    next_token_gen_a = out_full[:, -1:, :] 

    _, cache = block(tokens[:, :2, :]) 
    out_cache, cache_final = block(tokens[:, 2:3, :], past_kv=cache) # 使用前兩個 token 的 K/V 作為 cache，生成下一個 token 的輸出
    next_token_gen_b = out_cache 

    diff = torch.abs(next_token_gen_a - next_token_gen_b).max().item()
    print(f"誤差: {diff:.8e}")
    print(f"Cache K 維度: {cache_final[0].shape}")

if __name__ == "__main__":
    greedy_decode_demo()`,

import time
import matplotlib.pyplot as plt
from lab5 import KVCacheTransformerBlock 

def run_performance_test(max_len=512):
    D, H = 128, 8
    block = KVCacheTransformerBlock(D, H, 512).eval()
    
    full_times = []
    cache_times = []
    
    x_full = torch.randn(1, 1, D) 
    
    print("全量重算")
    for i in range(1, max_len + 1): 
        input_seq = torch.randn(1, i, D)
        start = time.time()
        _ = block(input_seq)
        full_times.append(time.time() - start)

    print("KV Cache")
    past_kv = None 
    for i in range(1, max_len + 1):
        single_token = torch.randn(1, 1, D) 
        start = time.time()
        _, past_kv = block(single_token, past_kv=past_kv) 
        cache_times.append(time.time() - start)

    return full_times, cache_times


full, cache = run_performance_test(512)

plt.figure(figsize=(10, 6))
plt.plot(full, label='Full Recalculation (Quadratic)', color='red')
plt.plot(cache, label='KV Cache (Linear)', color='blue')
plt.xlabel('Sequence Length')
plt.ylabel('Time per Token (s)')
plt.title('Inference Speed: Full vs KV Cache')
plt.legend()
plt.grid(True)
plt.savefig('lab6.png') `,
